<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>my game</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      body {
        display: grid;
        place-items: center;
      }
      canvas {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <canvas
      id="canvas"
      oncontextmenu="event.preventDefault()"
      tabindex="-1"
    ></canvas>
    <script>
      window.addEventListener('gameover', function (ev) {
        console.log('GAMEOVER!', ev.detail)
      })
      // Browsers block AudioContext until the user interacts with the page.
      // Resume on first click so raylib's audio comes through.
      window.addEventListener("click", function () {
        var Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        [Ctx, Module && Module.audioContext].forEach(function (ctx) {
          if (ctx && ctx.state === "suspended") ctx.resume();
        });
        // TODO: unecessary, here's where we call into Rust from the page
        Module.ccall('js_set_difficulty', null, ['number'], [2]);
      }, { once: true });
      var Module = {
        canvas: document.getElementById("canvas"),
        print: function (t) {
          console.log(t);
        },
        printErr: function (t) {
          console.error(t);
        },
      };
    </script>
    <script src="$BINARY.js"></script>
    <script>
    </script>
  </body>
</html>
